// ── 理科クイズ共通ユーティリティ ─────────────────────────

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function randomStars(n) {
  return Array.from({length:n}, () => ["⭐","🌟","✨"][randInt(0,2)]).join(" ");
}

// ── 日本語入力の正規化・採点 ──────────────────────────────
function normalizeJa(str) {
  return str
    .trim()
    .replace(/\s+/g, "")
    // カタカナ→ひらがな
    .replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60))
    // 全角英数→半角
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .toLowerCase();
}

function judgeInput(userInput, correctList) {
  const norm = normalizeJa(userInput);
  if (!norm) return false;
  return correctList.some(ans => normalizeJa(ans) === norm);
}

// ── 問題数の選択肢 ────────────────────────────────────────
const Q_OPTIONS = [5, 10, 15, 20];

const REVIEW_CORRECT_NEEDED = 5;
function _rvId(p){return((p.title||"")+"|"+(p._genType!==undefined?String(p._genType):p.question||"")).slice(0,60);}
function rvGetAll(k){try{var r=localStorage.getItem("rv_"+k);return r?JSON.parse(r):[];}catch(e){return[];}}
function _rvSave(k,b){try{localStorage.setItem("rv_"+k,JSON.stringify(b));}catch(e){}}
function rvAdd(k,p){try{var b=rvGetAll(k),id=_rvId(p),ex=b.find(function(x){return x._id===id;});if(ex){ex.miss=(ex.miss||0)+1;ex.ok=0;}else{var s={};Object.keys(p).forEach(function(key){if(key!=='figure')s[key]=p[key];});s._id=id;s._t=Date.now();s.miss=1;s.ok=0;b.push(s);}  _rvSave(k,b);}catch(e){}}
function rvCorrect(k,p){try{var b=rvGetAll(k),id=_rvId(p),i=b.findIndex(function(x){return x._id===id;});if(i<0)return false;b[i].ok=(b[i].ok||0)+1;var g=b[i].ok>=REVIEW_CORRECT_NEEDED;if(g)b.splice(i,1);_rvSave(k,b);return g;}catch(e){return false;}}
function rvGetProblems(k){return rvGetAll(k);}

function getProblems(diff) {
  if (diff === "shogaku") return [...PROBLEMS_SHOGAKU];
  if (diff === "nyushi")  return [...PROBLEMS_NYUSHI];
  return [...PROBLEMS_SHOGAKU, ...PROBLEMS_NYUSHI];
}

function pickProblems(diff, total) {
  const pool = getProblems(diff);
  const result = [], used = new Set();
  while (result.length < total) {
    const idx = randInt(0, pool.length - 1);
    if (!used.has(idx) || pool.length < total) { used.add(idx); result.push({...pool[idx]}); }
  }
  return result;
}

function OXAnswer({ problem, checked, userAnswer, onAnswer }) {
  return (
    <div className="ox-row">
      {[true, false].map(val => {
        let cls = val ? "ox-btn maru" : "ox-btn batsu";
        if (checked) {
          if (val === problem.correct) cls += " selected-correct";
          else if (userAnswer === val) cls += " selected-wrong";
        }
        return (
          <button key={String(val)} className={cls}
            onClick={() => !checked && onAnswer(val)} disabled={checked}>
            {val ? "○" : "×"}
          </button>
        );
      })}
    </div>
  );
}

function SelectAnswer({ problem, checked, userAnswer, onAnswer }) {
  return (
    <div className="select-grid">
      {problem.options.map((opt, i) => {
        let cls = "select-btn";
        if (checked) {
          if (i === problem.answer) cls += " show-correct";
          else if (userAnswer === i) cls += " wrong";
          cls += " disabled";
        }
        return (
          <button key={i} className={cls} onClick={() => !checked && onAnswer(i)} disabled={checked}>
            {opt}
          </button>
        );
      })}
    </div>
  );
}

function InputAnswer({ problem, checked, userAnswer, onAnswer, inputVal, setInputVal }) {
  const inputRef = useRef(null);
  const isCorrect = checked ? judgeInput(userAnswer || "", problem.answers) : null;
  let cls = "input-area";
  if (checked) cls += isCorrect ? " correct" : " wrong";
  return (
    <div className={cls} onClick={() => inputRef.current && inputRef.current.focus()}>
      <div className="input-label">📝 答えを入力</div>
      <input ref={inputRef} className="input-field" type="text"
        placeholder="ここに入力…" value={inputVal}
        onChange={e => !checked && setInputVal(e.target.value)}
        onKeyDown={e => { if (e.key==="Enter" && !checked && inputVal) onAnswer(inputVal); }}
        disabled={checked} autoComplete="off"/>
      {!checked && inputVal && (
        <button style={{alignSelf:"flex-end",background:"linear-gradient(135deg,#60a5fa,#3b82f6)",color:"#fff",border:"none",borderRadius:"10px",padding:"8px 20px",fontWeight:"900",fontSize:"14px",cursor:"pointer"}}
          onClick={() => onAnswer(inputVal)}>決定 ✔</button>
      )}
      {checked && !isCorrect && <div className="correct-ans-hint">✅ 正解：{problem.answers[0]}</div>}
    </div>
  );
}

function CalcAnswer({ problem, checked, userAnswer, onAnswer }) {
  const [val, setVal] = useState("");
  const isCorrect = checked ? Math.abs(parseFloat(val) - problem.answer) < 0.01 : null;
  const pressKey = k => {
    if (k==="BACK")  { setVal(v => v.slice(0,-1)); return; }
    if (k==="CLEAR") { setVal(""); return; }
    if (k==="." && val.includes(".")) return;
    if (val.length >= 8) return;
    setVal(v => v + k);
  };
  return (
    <>
      <div className={`input-area${checked?(isCorrect?" correct":" wrong"):""}`}>
        <div className="input-label">🔢 計算して答えを入力</div>
        <div style={{fontSize:"24px",fontWeight:"900",color:"#1f2937",minHeight:"32px"}}>
          {val || <span style={{color:"#d1d5db",fontWeight:"normal",fontSize:"16px"}}>?</span>}
          {!checked && <span style={{display:"inline-block",animation:"blink 1s step-end infinite",color:"#3b82f6"}}>|</span>}
          {val && <span style={{fontSize:"14px",color:"#6b7280",marginLeft:"4px"}}>{problem.unit}</span>}
        </div>
        {checked && !isCorrect && <div className="correct-ans-hint">✅ 正解：{problem.answer}{problem.unit}</div>}
      </div>
      {!checked && (
        <div className="calc-keypad">
          {CALC_KEYPAD.map((row, ri) => (
            <div key={ri} className="key-row">
              {row.map(key => (
                <button key={key.val} className="key-btn"
                  style={{background:key.val==="BACK"||key.val==="CLEAR"?"#ff8787":key.val==="×"||key.val==="÷"?"#74c0fc":"#fff",

                          boxShadow:"0 3px 0 rgba(0,0,0,0.15)"}}
                  onClick={() => pressKey(key.val)}>{key.label}</button>
              ))}
            </div>
          ))}
          <button style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,#60a5fa,#3b82f6)",color:"#fff",border:"none",borderRadius:"12px",fontSize:"15px",fontWeight:"900",cursor:"pointer",boxShadow:"0 3px 0 #1d4ed8"}}
            onClick={() => val && onAnswer(val)}>答え合わせ ✔</button>
        </div>
      )}
    </>
  );
}

  }, []);

  const startReview = () => {
    const bank = rvGetAll(QUIZ_KEY);
    setReviewBank(bank);
    if(bank.length === 0){ setMode("setup"); return; }
    setProblems(rvGetProblems(QUIZ_KEY));
    setCurrent(0); setScore(0); setStreak(0);
    setChecked(false); setUserAnswer(null); setInputVal(""); setCeleb(false);
    setMode("review");
  };
  const startQuiz = () => {
    setProblems(pickProblems(diff, totalQ));
    setCurrent(0); setScore(0); setStreak(0);
    setChecked(false); setUserAnswer(null); setInputVal(""); setCeleb(false);
    setMode("quiz");
  };

  const problem = problems[current] || null;

  const handleAnswer = ans => {
    if (checked) return;
    setUserAnswer(ans); setChecked(true);
    const p = problem;
    let ok = false;
    if (p.qtype==="ox")     ok = ans===p.correct;
    if (p.qtype==="select") ok = ans===p.answer;
    if (p.qtype==="input")  ok = judgeInput(ans, p.answers);
    if (p.qtype==="calc")   ok = Math.abs(parseFloat(ans)-p.answer)<0.01;
    setIsCorrect(ok);
    if (ok) {
      setScore(s=>s+1); const ns=streak+1; setStreak(ns);
      if (ns>best) { setBest(ns); saveBest(ns); }
      setCeleb(true); setTimeout(()=>setCeleb(false),1800); rvCorrect(QUIZ_KEY,problem); setReviewBank(rvGetAll(QUIZ_KEY));
    } else { setStreak(0); rvAdd(QUIZ_KEY, problem); setReviewBank(rvGetAll(QUIZ_KEY)); }
  };

  const nextQuestion = () => {
    const _e=current+1>=problems.length;
    if(_e&&mode==="review"){const b=rvGetAll(QUIZ_KEY);setReviewBank(b);if(b.length>0){startReview();}else{setMode("graduated");}return;}
    if(_e){setMode("result");return;}
    setCurrent(c=>c+1);
    setChecked(false); setUserAnswer(null); setInputVal(""); setCeleb(false);
  };

  const progress = problem ? (current/totalQ)*100 : 0;
  const BTN = "linear-gradient(135deg,#60a5fa,#3b82f6)";

  if (mode==="setup") return (
    <div className="setup-wrap" style={{background:"#eff6ff"}}>
      <div className="setup-card">
        <div className="setup-emoji">🔊</div>
        <h1 className="setup-title" style={{color:"#1e3a8a"}}>音の性質 理科クイズ</h1>
        <p className="setup-sub">小学生〜中学入試レベル</p>
                <div style={{marginBottom:"16px"}}>
          <button onClick={()=>{if(reviewBank.length>0)startReview();}}
            style={{width:"100%",padding:"14px 16px",borderRadius:"14px",
              cursor:reviewBank.length>0?"pointer":"default",
              border:reviewBank.length>0?"2px solid #ef4444":"2px solid #e5e7eb",
              background:reviewBank.length>0?"#fef2f2":"#f9fafb",
              display:"flex",alignItems:"center",justifyContent:"space-between",
              fontFamily:"inherit",opacity:reviewBank.length===0?0.45:1}}>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:"900",fontSize:"15px",color:reviewBank.length>0?"#b91c1c":"#374151"}}>📚 復習モード</div>
              {reviewBank.length>0&&<div style={{fontSize:"11px",color:"#ef4444",marginTop:"2px"}}>タップして今すぐ開始！</div>}
            </div>
            <span style={{background:reviewBank.length>0?"#ef4444":"#d1d5db",color:"#fff",borderRadius:"99px",padding:"4px 12px",fontSize:"13px",fontWeight:"bold"}}>
              {reviewBank.length>0?`${reviewBank.length}問`:"なし"}
            </span>
          </button>
          {reviewBank.length===0&&<div style={{fontSize:"11px",color:"#9ca3af",textAlign:"center",marginTop:"4px"}}>間違えた問題が溜まるとここで復習できます</div>}
        </div>
        {best>0 && <div className="best-badge" style={{background:"#dbeafe",border:"1.5px solid #60a5fa",color:"#1e3a8a"}}>🏆 最高連続記録：<strong>{best}問</strong></div>}
        <div className="qcount-section">レベルを選ぶ</div>
        <div className="diff-btn-row">
          {[
            {key:"shogaku",emoji:"🌱",name:"小学生レベル",desc:"音のしくみ・伝わり方・糸電話の基本"},
            {key:"nyushi", emoji:"🔥",name:"中学入試レベル",desc:"音の速さ計算・ドップラー効果・振動数"},
            {key:"mix",    emoji:"⭐",name:"ミックス",desc:"全問題からランダムに出題"},
          ].map(d=>(
            <button key={d.key} className="diff-card-btn"
              style={{background:diff===d.key?"#eff6ff":"#f9fafb",
                      border:diff===d.key?"2px solid #3b82f6":"2px solid #e5e7eb",
                      boxShadow:diff===d.key?"0 3px 0 #3b82f6":"none"}}
              onClick={()=>setDiff(d.key)}>
              <span className="diff-emoji">{d.emoji}</span>
              <div>
                <div className="diff-name" style={{color:diff===d.key?"#1e3a8a":"#1f2937"}}>{d.name}</div>
                <div className="diff-desc">{d.desc}</div>
              </div>
              {diff===d.key && <span style={{marginLeft:"auto",fontSize:"18px"}}>✅</span>}
            </button>
          ))}
        </div>
        <div className="qcount-section">何問やる？</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n=>(
            <button key={n} className="qcount-btn"
              style={{border:totalQ===n?"2px solid #3b82f6":"2px solid #dee2e6",
                      background:totalQ===n?"#3b82f6":"#f8f9fa",
                      color:totalQ===n?"#fff":"#495057",
                      boxShadow:totalQ===n?"0 3px 0 #1d4ed8":"none"}}
              onClick={()=>setTotalQ(n)}>{n}問</button>
          ))}
        </div>
        <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #1d4ed8"}}
          onClick={startQuiz}>スタート！ 🚀</button>
      </div>
    </div>
  );

  if (mode==="result") {
    const pct=Math.round((score/totalQ)*100);
    return (
      <div className="setup-wrap" style={{background:"#eff6ff"}}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100?"🏆":pct>=70?"🎉":"💪"}</div>
          <h2 className="setup-title" style={{color:"#1e3a8a"}}>おわり！</h2>
          <p className="result-score">{totalQ}問中 <span className="result-big" style={{color:"#3b82f6"}}>{score}</span> 問正解</p>
          <div className="pct-bar-bg" style={{background:"#dbeafe"}}><div className="pct-bar-fill" style={{background:BTN,width:`${pct}%`}}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">この回の最高連続</div><div className="streak-result-val" style={{color:"#ef4444"}}>🔥 {streak}問</div></div>
            <div className="streak-result-box"><div className="streak-result-label">歴代最高連続</div><div className="streak-result-val" style={{color:"#f59f00"}}>🏆 {best}問</div></div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
            <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #1d4ed8"}} onClick={startQuiz}>もう一度</button>
            <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>設定へ</button>
          </div>
          {reviewBank.length>0&&(
            <button className="start-btn"
              style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",boxShadow:"0 4px 0 #991b1b",marginTop:"8px",width:"100%"}}
              onClick={startReview}>続けて復習する 📚 ({reviewBank.length}問)</button>
          )}
        </div>
      </div>
    );
  }

  if (!problem) return null;

  return (
    <div className="rika-root">
      {celeb && (
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">🎉</div>
            <div className="celeb-text" style={{color:"#1e3a8a"}}>せいかい！</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak>=3 && <div className="celeb-streak" style={{background:"#ef4444"}}>🔥 {streak}れんぞく！</div>}
            {streak===best && streak>1 && <div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>🏆 新記録！</div>}
          </div>
        </div>
      )}
      <div className="quiz-header">
        <div className="header-left">
          <span className="q-label">Q{current+1}<span className="q-total">/{totalQ}</span></span>
          <span className="type-tag" style={{background:problem.color}}>{problem.title}</span>
          <span className={`diff-badge ${problem.diff==="nyushi"?"diff-nyushi":"diff-shogaku"}`}>
            {problem.diff==="nyushi"?"入試":"小学"}
          </span>
        </div>
        <div className="header-right">
          <span className="score-label">⭐ {score}</span>
          {streak>=2 && <span className="streak-tag-sm">🔥{streak}</span>}
          {best>0 && <span className="best-tag-sm">🏆{best}</span>}
        </div>
      </div>
      <div className="progress-bg" style={{background:"#dbeafe"}}>
        <div className="progress-fill" style={{background:problem.color,width:`${progress}%`}}/>
      </div>
      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        {problem.question.split("\n").map((line,i)=>(
          <p key={i} className="problem-line" style={{fontSize:"16px"}}>{line}</p>
        ))}
      </div>
      {problem.qtype==="ox"     && <OXAnswer     problem={problem} checked={checked} userAnswer={userAnswer} onAnswer={handleAnswer}/>}
      {problem.qtype==="select" && <SelectAnswer problem={problem} checked={checked} userAnswer={userAnswer} onAnswer={handleAnswer}/>}
      {problem.qtype==="input"  && <InputAnswer  key={current} problem={problem} checked={checked} userAnswer={userAnswer} onAnswer={handleAnswer} inputVal={inputVal} setInputVal={setInputVal}/>}
      {problem.qtype==="calc"   && <CalcAnswer   key={current} problem={problem} checked={checked} userAnswer={userAnswer} onAnswer={handleAnswer}/>}
      {checked && (
        <>
          <div style={{textAlign:"center",fontSize:"20px",fontWeight:"900",color:isCorrect?"#059669":"#dc2626"}}>
            {isCorrect?"✅ せいかい！":"❌ ざんねん…"}
          </div>
          <div className="explanation-card">
            <div className="explanation-label">📖 解説</div>
            {problem.explanation}
          </div>
          <button className="next-btn"
            style={{background:"linear-gradient(135deg,#51cf66,#20c997)",color:"#fff",boxShadow:"0 4px 0 #2f9e44"}}
            onClick={nextQuestion}>
            {current+1>=totalQ?"結果を見る 🎉":"つぎへ →"}
          </button>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
