// ── 理科クイズ共通ユーティリティ ─────────────────────────

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function randomStars(n) {
  return Array.from({length:n}, () => ["⭐","🌟","✨"][randInt(0,2)]).join(" ");
}

// ── 日本語入力の正規化・採点 ──────────────────────────────
function normalizeJa(str) {
  return str
    .trim()
    .replace(/\s+/g, "")
    // カタカナ→ひらがな
    .replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60))
    // 全角英数→半角
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .toLowerCase();
}

function judgeInput(userInput, correctList) {
  const norm = normalizeJa(userInput);
  if (!norm) return false;
  return correctList.some(ans => normalizeJa(ans) === norm);
}

<script>
const QUIZ_KEY="hikari";

const REVIEW_CORRECT_NEEDED = 5;
function _rvId(p){return((p.title||"")+"|"+(p._genType!==undefined?String(p._genType):p.question||"")).slice(0,60);}
function rvGetAll(k){try{var r=localStorage.getItem("rv_"+k);return r?JSON.parse(r):[];}catch(e){return[];}}
function _rvSave(k,b){try{localStorage.setItem("rv_"+k,JSON.stringify(b));}catch(e){}}
function rvAdd(k,p){try{var b=rvGetAll(k),id=_rvId(p),ex=b.find(function(x){return x._id===id;});if(ex){ex.miss=(ex.miss||0)+1;ex.ok=0;}else{var s={};Object.keys(p).forEach(function(key){if(key!=="figure")s[key]=p[key];});s._id=id;s._t=Date.now();s.miss=1;s.ok=0;b.push(s);} _rvSave(k,b);}catch(e){}}
function rvCorrect(k,p){try{var b=rvGetAll(k),id=_rvId(p),i=b.findIndex(function(x){return x._id===id;});if(i<0)return false;b[i].ok=(b[i].ok||0)+1;var g=b[i].ok>=REVIEW_CORRECT_NEEDED;if(g)b.splice(i,1);_rvSave(k,b);return g;}catch(e){return false;}}
function rvGetProblems(k){return rvGetAll(k);}

</script>

function genCalcProblems() {

      title: "鏡面角度と入射角",
      color: "#dc2626",

      answer: incidence,
      unit: "度",
      explanation: `鏡の面との角度が ${mirrorAngle}° のとき、法線（鏡に垂直な線）との角度は\n90 − ${mirrorAngle} = ${incidence}° です。これが入射角です。`

    b: 20

    a: 40,
    b: 40

    a: 60,
    b: 30
  }, {
    a: 20,
    b: 30
  }, {
    a: 60,
    b: 20

    a: 40,
    b: 24

    a: 30,
    b: 30

    a: 24,
    b: 40

    const f_num = a * b,
      f_den = a + b;
    const f = f_num / f_den;

    if (whichUnknown === "f") {

        title: "焦点距離の計算",
        color: "#dc2626",
        question: `物体をレンズの中心から ${a}cm 離して置いたら、\nレンズの反対側 ${b}cm のところに実像ができました。\n焦点距離は何cmですか？\n（1/f = 1/a + 1/b を使う）`,
        answer: f,
        unit: "cm",
        explanation: `1/f = 1/${a} + 1/${b} = ${b}/${f_num} + ${a}/${f_num} = ${a + b}/${f_num}\nf = ${f_num}/${a + b} = ${f}cm`

    } else if (whichUnknown === "b") {

      const b2 = b2_num / b2_den;

        qtype: "calc",
        diff: "nyushi",
        title: "像の位置の計算",
        color: "#dc2626",
        question: `焦点距離 ${f}cm の凸レンズの中心から\n物体を ${a}cm 離して置きました。\n実像はレンズの反対側何cmにできますか？\n（1/f = 1/a + 1/b を使う）`,
        answer: b2,
        unit: "cm",
        explanation: `1/${b2} = 1/${f} - 1/${a} = ${a}/${f * a} - ${f}/${f * a} = ${a - f}/${f * a}\nb = ${f * a}/${a - f} = ${b2}cm`

      title: "光の速さ計算",
      color: "#dc2626",
      question: `光の速さを秒速30万kmとします。\n光が ${t} 秒間に進む距離は何万kmですか？`,

  });

  // ⑤ 入射角から屈折角（近似、空気→水：n=1.33, 小学向け簡易版）

  const angles1 = [30, 40, 45, 50, 60];
  angles1.forEach(inc => {

        title: "屈折角の計算",
        color: "#dc2626",
        question: `光が空気から水に入るとき、入射角が ${inc}° でした。\n屈折角は約何度ですか？\n（空気の屈折率1.0、水の屈折率1.33として計算）`,

function getProblems(diff) {
  const calcProbs = genCalcProblems();

  const pool = getProblems(diff);
  const result = [];
  const used = new Set();
  // プールが足りない場合は重複を許す
  while (result.length < total) {
    const idx = randInt(0, pool.length - 1);
    if (!used.has(idx) || pool.length < total) {
      used.add(idx);
      result.push({
        ...pool[idx]
      });
    }
  }
  return result;
}
